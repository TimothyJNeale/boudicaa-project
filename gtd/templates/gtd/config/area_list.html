{% extends "gtd/base.html" %}
{% block title %}Areas — Boudicaa{% endblock %}

{% block content %}
<div class="page-header d-flex flex-wrap align-items-center justify-content-between gap-3">
  <h1 class="page-title">Areas</h1>
  <a href="{% url 'area_create' %}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i> New Area</a>
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead><tr><th>Area</th><th>Domain</th><th class="text-end">Actions</th></tr></thead>
      <tbody>
        {% for area in object_list %}
        <tr>
          <td>{{ area.name }}</td>
          <td><span class="badge bg-{{ area.domain.color }}">{{ area.domain.name }}</span></td>
          <td class="text-end">
            {% if not area.is_protected %}
            <a href="{% url 'area_update' area.pk %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
            <a href="{% url 'area_delete' area.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
            {% endif %}
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center py-3 text-muted">No areas.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

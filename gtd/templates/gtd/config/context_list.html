{% extends "gtd/base.html" %}
{% block title %}Contexts — Boudicaa{% endblock %}

{% block content %}
<div class="page-header d-flex flex-wrap align-items-center justify-content-between gap-3">
  <h1 class="page-title">Contexts</h1>
  <a href="{% url 'context_create' %}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i> New Context</a>
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead><tr><th>Name</th><th class="text-end">Actions</th></tr></thead>
      <tbody>
        {% for context in object_list %}
        <tr>
          <td>{{ context.name }}</td>
          <td class="text-end">
            <a href="{% url 'context_update' context.pk %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
            <a href="{% url 'context_delete' context.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="2" class="text-center py-3 text-muted">No contexts.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

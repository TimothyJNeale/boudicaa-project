{% extends "gtd/base.html" %}
{% block title %}Capture — Boudicaa{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Capture to Inbox</h1>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_item" class="form-label">What's on your mind?</label>
        <textarea name="item" id="id_item" class="form-control" rows="3" required autofocus>{{ form.item.value|default:'' }}</textarea>
        {% if form.item.errors %}<div class="invalid-feedback d-block">{{ form.item.errors.0 }}</div>{% endif %}
      </div>
      <div class="mb-3">
        <label for="id_area" class="form-label">Area (optional)</label>
        {{ form.area }}
        {% if form.area.errors %}<div class="invalid-feedback d-block">{{ form.area.errors.0 }}</div>{% endif %}
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i> Capture
        </button>
        <a href="{% url 'inbox_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

<!-- Single inbox item for conveyor belt processing -->
<div class="card">
  <div class="card-body">
    <div class="mb-3">
      <blockquote class="blockquote">
        <p>{{ inbox_item.item }}</p>
      </blockquote>
      {% if inbox_item.area %}
      <small class="text-muted">Area: {{ inbox_item.area }}</small>
      {% endif %}
      <br>
      <small class="text-muted">Captured {{ inbox_item.created_at|timesince }} ago</small>
    </div>

    <div class="d-flex flex-wrap gap-2">
      <form method="post" action="{% url 'convert_to_action' inbox_item.pk %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-square me-1"></i> Make Action
        </button>
      </form>
      <form method="post" action="{% url 'convert_to_project' inbox_item.pk %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-primary">
          <i class="bi bi-kanban me-1"></i> Make Project
        </button>
      </form>
      <form method="post" action="{% url 'archive_inbox_item' inbox_item.pk %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-secondary">
          <i class="bi bi-archive me-1"></i> Archive
        </button>
      </form>
      <form method="post" action="{% url 'delete_inbox_item' inbox_item.pk %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger">
          <i class="bi bi-trash me-1"></i> Delete
        </button>
      </form>
    </div>
  </div>
</div>

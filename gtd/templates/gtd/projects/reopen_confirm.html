{% extends "gtd/base.html" %}
{% block title %}Reopen Project — Boudicaa{% endblock %}

{% block content %}
<div class="card mx-auto" style="max-width: 500px;">
  <div class="card-body text-center">
    <i class="bi bi-arrow-counterclockwise text-warning" style="font-size: 3rem;"></i>
    <h4 class="mt-3">Reopen "{{ project.name }}"?</h4>
    <p class="text-muted">The project will be set to IN ACTION status.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn btn-warning">Yes, Reopen</button>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
